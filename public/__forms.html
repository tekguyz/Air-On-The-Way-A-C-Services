<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms</title>
</head>
<body>
    <!-- This file is used by Netlify to detect forms in Next.js 15+ apps -->
    <form 
        name="contact" 
        data-netlify="true" 
        netlify-honeypot="bot-field" 
        encType="multipart/form-data"
        action="/"
        hidden
    >
        <input type="text" name="bot-field" />
        <input type="text" name="full_name" />
        <input type="tel" name="phone_number" />
        <input type="text" name="address" />
        <select name="service_type">
            <option value="">Select a service</option>
            <option value="fast-ac-repair">Fast A/C Repair</option>
            <option value="full-installations">Full Installations</option>
            <option value="routine-maintenance">Routine Maintenance</option>
            <option value="duct-cleaning">Duct Cleaning</option>
            <option value="commercial-hvac">Commercial HVAC</option>
            <option value="emergency-service">24/7 Emergency</option>
        </select>
        <input type="file" name="unit_photo" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
